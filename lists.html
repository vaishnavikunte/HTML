<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul style="list-style-type:disc;">Unordered list
        <li>apple</li>
        <li>banana</li>
        <li>grapes</li>
        <li>orange</li>
    </ul>

    <ol>Ordered list
        <li>apple</li>
        <li>banana</li>
        <li>grapes</li>
        <li>orange</li>
    </ol>

    <dl>Description list
        <!--dt is description term and dd is description-->
        <dt>Coffee</dt>
        <dd>black hot drink</dd>
        <dt>Milk</dt>
        <dd>white cold drink</dd>
      </dl>

      <ul>
        <li>Coffee</li>
        <li>Tea
          <ul>
            <li>Black tea</li>
            <li>Green tea</li>
          </ul>
        </li>
        <li>Milk</li>
      </ul>
</body>
</html>
